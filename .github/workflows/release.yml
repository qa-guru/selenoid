name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag for manual docker publish (e.g. v2.0.5)'
        required: true
        default: 'v2.0.5'

permissions:
  contents: write

jobs:
  golang:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release_meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: ~1.23.8

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test
        run: ci/test.sh

      - name: Build
        env:
          GIT_REVISION: ${{ github.ref_name }}
        run: ci/build.sh

      - name: Prepare release version
        id: release_meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - uses: AButler/upload-release-assets@v3.0
        if: github.event_name == 'release'
        with:
          files: 'dist/*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid
        run: ci/docker-push.sh $RELEASE_VERSION

      - name: Latest release image
        if: github.event_name == 'release'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid
        run: ci/docker-push.sh latest-release

  deploy-smoke:
    name: Release smoke → selenoid-tests
    needs: golang
    if: success()
    uses: ./.github/workflows/smoke-trigger-callback.yml
    secrets:
      SELENOID_TESTS_DISPATCH_TOKEN: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
    with:
      test_tags: api,smoke
      source_version: ${{ needs.golang.outputs.release_version }}
      source_ref: ${{ github.ref }}
      summary_title: Release smoke → selenoid-tests
